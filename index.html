<!DOCTYPE html>
<html>
<head>
<title>For You 💫</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
  color: white;
  overflow-x: hidden;
  text-align: center;
}

.container {
  padding: 50px 20px;
}

h1 {
  font-size: 40px;
}

.cursor {
  display: inline-block;
  width: 3px;
  background: white;
  animation: blink 0.7s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* card */
.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  margin: 20px auto;
  width: 260px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

/* image */
.card img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 10px;
}

/* chat */
.chat {
  max-width: 300px;
  margin: 20px auto;
  text-align: left;
}

.msg {
  background: rgba(255,255,255,0.15);
  padding: 10px;
  border-radius: 10px;
  margin: 10px 0;
}

/* button */
button {
  padding: 10px 20px;
  border: none;
  background: #ff4e6a;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #ff1e4d;
}

/* hearts */
.heart {
  position: fixed;
  bottom: -10px;
  color: red;
  font-size: 20px;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">

  <h1>
    Hey <span id="name"></span><span class="cursor"></span> 😊
  </h1>

  <p>I made this just for you 💖</p>

  <div class="card">
    <!-- 👉 ADD HER PHOTO HERE -->
    <img src="kulsum.jpg" alt="Kulsum">
    
    <p>I feel good when I talk to you ✨</p>
  </div>

  <div class="chat">
    <div class="msg">Hi 🙂</div>
    <div class="msg">mai aapke bara mai sooch rha tha</div>
    <div class="msg">So I made this 😄</div>
  </div>

  <button onclick="showMessage()">Click Me 💌</button>

  <p id="message"></p>

</div>

<!-- music -->
<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const text = "Kulsum";
let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("name").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 120);
  }
}
window.onload = typeEffect;

function showMessage() {
  document.getElementById("message").innerHTML =
  "I don't know how to say this perfectly... but I really like talking to you ❤️";
}

function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
